<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Padeja Live Board — Brentwood Padel Club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0A1523; --bg2:#0D1B2A; --panel:rgba(255,255,255,0.045);
      --brd:rgba(255,255,255,0.10); --teal:#00D4AA; --red:#FF6B6B;
      --gold:#FFD166; --txt:#FFFFFF; --muted:rgba(255,255,255,0.55);
      --muted2:rgba(255,255,255,0.35);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden}
    body{
      font-family:'Outfit',-apple-system,sans-serif;
      background:radial-gradient(ellipse at 20% -10%,rgba(0,212,170,0.10),transparent 55%),var(--bg);
      color:var(--txt);height:100vh;display:flex;flex-direction:column;
    }
    /* ---------- TOP BAR ---------- */
    header{display:flex;align-items:center;justify-content:space-between;padding:1.5vh 2.4vw;border-bottom:1px solid var(--brd);flex:0 0 auto}
    .brand{display:flex;align-items:center;gap:1.4vw}
    .brand img{height:4.2vh;width:auto;display:block}
    .brand .sep{width:1px;height:3.8vh;background:var(--brd)}
    .club{font-size:2.3vh;font-weight:800;letter-spacing:.3px}
    .club small{display:block;font-size:1.3vh;font-weight:600;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
    .top-right{display:flex;align-items:center;gap:1.6vw}
    .live{display:flex;align-items:center;gap:.6vw;background:rgba(255,107,107,0.12);border:1px solid rgba(255,107,107,0.35);border-radius:40px;padding:.6vh 1.1vw}
    .live .dot{width:1.05vh;height:1.05vh;border-radius:50%;background:var(--red);animation:pulse 1.3s infinite}
    .live span{font-size:1.35vh;font-weight:800;letter-spacing:2px;color:var(--red)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .clock{font-size:2.5vh;font-weight:800;font-variant-numeric:tabular-nums;text-align:right}
    .clock small{font-size:1.25vh;color:var(--muted);font-weight:600;display:block}

    /* ---------- MAIN GRID ---------- */
    main{flex:1 1 auto;display:grid;grid-template-columns:1.9fr 1fr;gap:1.8vw;padding:2vh 2.4vw;min-height:0}
    .board,.side{background:var(--panel);border:1px solid var(--brd);border-radius:1.5vh;display:flex;flex-direction:column;min-height:0;overflow:hidden}
    .board-head{display:flex;align-items:baseline;justify-content:space-between;padding:2vh 2vw 1.2vh;border-bottom:1px solid var(--brd)}
    .board-title{font-size:2.7vh;font-weight:900;letter-spacing:-.3px}
    .board-sub{font-size:1.45vh;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:2px}
    .board-body{flex:1 1 auto;overflow:hidden;padding:.4vh 1.2vw 1.2vh}
    table{width:100%;border-collapse:collapse}
    thead th{font-size:1.35vh;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2);text-align:center;padding:1vh .6vw;border-bottom:1px solid var(--brd)}
    thead th.l{text-align:left}
    tbody td{font-size:2.35vh;font-weight:600;padding:1.02vh .6vw;text-align:center;border-bottom:1px solid rgba(255,255,255,0.05)}
    tbody td.l{text-align:left}
    tbody tr:last-child td{border-bottom:none}
    .pos{width:3.4vw;color:var(--muted2);font-weight:800}
    tr.p1 .pos{color:var(--gold)} tr.p2 .pos{color:#CBD5E1} tr.p3 .pos{color:#E8A87C}
    .team{font-weight:700}
    .pts{font-weight:900;color:var(--teal);font-size:2.55vh}
    .diff.pos-v{color:var(--teal)} .diff.neg-v{color:var(--red)}

    /* ---------- SIDE (UPCOMING + QR) ---------- */
    .side-head{padding:2vh 1.6vw 1.2vh;border-bottom:1px solid var(--brd)}
    .side-head h2{font-size:2.2vh;font-weight:900}
    .side-head p{font-size:1.3vh;color:var(--muted);font-weight:600;margin-top:2px}
    .side-body{flex:1 1 auto;overflow:hidden;padding:1.1vh 1.6vw;display:flex;flex-direction:column;gap:1.1vh}
    .up{background:var(--bg2);border:1px solid var(--brd);border-radius:1.1vh;padding:1.3vh 1.2vw;display:flex;gap:1vw;align-items:center}
    .up-main{flex:1 1 auto;min-width:0}
    .up-top{display:flex;align-items:center;justify-content:space-between;gap:.8vw;margin-bottom:.6vh}
    .up-name{font-size:1.9vh;font-weight:800;line-height:1.2}
    .up-meta{display:flex;flex-wrap:wrap;gap:.5vw 1vw;font-size:1.4vh;color:var(--muted);font-weight:600;align-items:center}
    .up-scan{font-size:1.2vh;font-weight:700;color:var(--teal);margin-top:.5vh;letter-spacing:.3px}
    .qr{flex:0 0 auto;background:#fff;border-radius:.9vh;padding:.7vh;width:11vh;height:11vh;display:flex;align-items:center;justify-content:center}
    .qr svg{width:100%;height:100%;display:block}
    .badge{font-size:1.2vh;font-weight:800;letter-spacing:.5px;padding:.45vh .8vw;border-radius:30px;text-transform:uppercase;white-space:nowrap}
    .badge.open{background:rgba(0,212,170,0.15);color:var(--teal)}
    .badge.type{background:rgba(255,209,102,0.14);color:var(--gold)}
    .badge.soon{background:rgba(255,255,255,0.08);color:var(--muted)}

    /* ---------- STATES ---------- */
    .state{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--muted);gap:1.4vh;padding:3vh}
    .state .big{font-size:2.5vh;font-weight:800;color:var(--txt)}
    .state .sm{font-size:1.6vh}
    .state img{height:6.5vh;opacity:.9;margin-bottom:1vh}

    /* ---------- LIVE STRIP ---------- */
    .live-strip{flex:0 0 auto;border-top:1px solid var(--brd);padding:1.4vh 2.4vw;display:flex;flex-direction:column;gap:1vh;background:rgba(255,107,107,0.04)}
    .ls-head{display:flex;align-items:center;gap:.8vw;font-size:1.5vh;font-weight:900;letter-spacing:2px;color:var(--red);text-transform:uppercase}
    .ls-head .d{width:1.1vh;height:1.1vh;border-radius:50%;background:var(--red);animation:pulse 1.3s infinite}
    .ls-cards{display:grid;grid-auto-flow:column;grid-auto-columns:1fr;gap:1.2vw}
    .lm{background:var(--bg2);border:1px solid var(--brd);border-radius:1.1vh;padding:1.1vh 1vw;min-width:0}
    .lm-top{display:flex;align-items:center;gap:.6vw;margin-bottom:.5vh}
    .lm-court{font-size:1.4vh;font-weight:900;color:var(--teal);text-transform:uppercase;letter-spacing:.5px}
    .lm-ctx{font-size:1.2vh;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px}
    .lm-flag{margin-left:auto;font-size:1.1vh;font-weight:900;letter-spacing:.5px;padding:.35vh .7vw;border-radius:20px;text-transform:uppercase}
    .lm-flag.mp{background:rgba(255,107,107,0.18);color:var(--red)}
    .lm-flag.sp{background:rgba(255,209,102,0.18);color:var(--gold)}
    .lm-flag.tb{background:rgba(0,212,170,0.16);color:var(--teal)}
    .lm-cols{font-size:1.05vh;font-weight:800;color:var(--muted2);letter-spacing:1px;text-transform:uppercase;text-align:right;padding-bottom:.2vh}
    .lm-cols span{display:inline-block;width:2.4vw;text-align:center}
    .lm-grid{display:grid;grid-template-columns:1fr auto}
    .lm-name{font-size:1.85vh;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:.35vh 0;display:flex;align-items:center;gap:.5vw}
    .lm-nums{display:flex;gap:0;align-items:center;padding-left:1vw}
    .lm-nums b{font-size:1.9vh;font-weight:800;width:2.4vw;text-align:center;font-variant-numeric:tabular-nums}
    .lm-nums b.pt{color:var(--teal);font-weight:900}
    .serve{width:.9vh;height:.9vh;border-radius:50%;background:transparent;flex:0 0 auto}
    .serve.on{background:var(--gold)}

    /* ---------- FOOTER ---------- */
    footer{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:1.2vh 2.4vw;border-top:1px solid var(--brd);font-size:1.45vh;color:var(--muted)}
    .dots{display:flex;gap:.7vw}
    .dots i{width:1vh;height:1vh;border-radius:50%;background:rgba(255,255,255,0.18);transition:background .3s,width .3s}
    .dots i.on{background:var(--teal);width:2.4vh;border-radius:20px}
    .updated b{color:var(--muted2);font-weight:700}
    .powered{font-weight:700}
    .powered b{color:var(--teal)}
    .fade{animation:fadein .5s ease}
    @keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    #reconnect{position:fixed;bottom:2vh;left:50%;transform:translateX(-50%);background:rgba(255,107,107,0.14);border:1px solid rgba(255,107,107,0.4);color:var(--red);font-size:1.4vh;font-weight:700;padding:.8vh 1.4vw;border-radius:30px;display:none}
  </style>
</head>

    const cap = (s) => s ? s.charAt(0).toUpperCase() + s.slice(1) : s;

    async function api(path) {
      const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, { headers: HEADERS, cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();

      $('date').textContent = now.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
    }
    setInterval(tick, 1000); tick();

    function fmtDate(d){ if(!d) return null; const dt=new Date(d+'T00:00:00'); return isNaN(dt)?null:dt.toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }
    function isFutureOrToday(d){ if(!d) return false; const dt=new Date(d+'T23:59:59'); return !isNaN(dt)&&dt.getTime()>=Date.now(); }

    // Build a QR SVG for a registration code (returns HTML string, or '' on failure)
    function qrFor(code){
      try{
        const qr = qrcode(0,'M');
        qr.addData(REG_BASE + code);
        qr.make();
        return '<div class="qr">' + qr.createSvgTag({cellSize:4,margin:0,scalable:true}) + '</div>';
      }catch(e){ return ''; }
    }

    let boards = [], upcoming = [], live = [];
    let idx = 0, livePage = 0;

    async function resolveClubId(){
      if (CLUB_ID) return CLUB_ID;
      let rows = await api('clubs?name=ilike.'+encodeURIComponent(CLUB_NAME)+'&select=id,name&limit=1');
      if (!rows.length) rows = await api('clubs?name=ilike.'+encodeURIComponent('%'+CLUB_NAME+'%')+'&select=id,name&limit=1');
      if (!rows.length) throw new Error('club-not-found');
      $('clubName').innerHTML = esc(rows[0].name) + '<small>Live League Board</small>';
      return rows[0].id;
    }

    async function loadLive(clubId, compIds){
      const map = {};
      try {
        const byClub = await api('live_matches?club_name=ilike.*'+encodeURIComponent(CLUB_NAME)+'*&select=*');
        byClub.forEach(m => map[m.match_code] = m);
      } catch(e){}
      if (compIds.length){
        try {
          const byComp = await api('live_matches?tournament_id=in.('+compIds.join(',')+')&select=*');
          byComp.forEach(m => map[m.match_code] = m);
        } catch(e){}
      }
      const now = Date.now();
      return Object.values(map).filter(m => {
        const st = (m.match_state||'').toLowerCase();
        const finished = m.match_winner || st==='finished' || st==='completed' || st==='ended';
        const age = m.updated_at ? (now - new Date(m.updated_at).getTime()) : 0;
        return !finished && age < 2*3600*1000;
      }).sort((a,b)=> (a.court_number||99) - (b.court_number||99));
    }

    async function loadAll(){
      try{
        const clubId = await resolveClubId();
        const comps = await api('public_leagues_by_club?main_club_id=eq.'+encodeURIComponent(clubId)+'&select=*');
        const compIds = comps.map(c=>c.id);

        const nb = [], nu = [];
        for (const c of comps){
          const open = (c.registration_status||'open')==='open';
          if (open || isFutureOrToday(c.start_date)){
            nu.push({ name:c.name, type:c.competition_type, date:fmtDate(c.start_date), open, code:c.registration_code, start:c.start_date||'9999' });
          }
          let groups = [];
          try{ groups = await api('leagues?tournament_id=eq.'+encodeURIComponent(c.id)+'&select=*&order=name.asc'); }catch(e){}
          for (const g of groups){
            let teams = [];
            try{ teams = await api('league_teams?league_id=eq.'+encodeURIComponent(g.id)+'&select=*'); }catch(e){}
            if (!teams.length) continue;
            teams.sort((a,b)=> ((b.league_points||0)-(a.league_points||0)) || (((b.points_for||0)-(b.points_against||0))-((a.points_for||0)-(a.points_against||0))) || ((b.won||0)-(a.won||0)));
            nb.push({ title:c.name, sub:(groups.length>1&&g.name)?g.name:(c.competition_type?cap(c.competition_type):'League Table'), teams });
          }
        }
        nu.sort((a,b)=>String(a.start).localeCompare(String(b.start)));

        boards = nb; upcoming = nu;
        live = await loadLive(clubId, compIds);
        if (idx >= boards.length) idx = 0;

        $('reconnect').style.display='none';
        $('updated').textContent = new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
        renderSide(); renderBoard(); renderLive();
        setupRotation();
      }catch(e){
        if (e.message==='club-not-found'){ showBoardState('Club not found','Check the club name in the address, or add ?clubId=… to the URL.'); $('sideBody').innerHTML=''; }

      }
    }

    }

    function renderBoard(){
      if (!boards.length){ showBoardState('No live league tables yet','Standings appear here once matches are played at this club.'); renderDots(); return; }
      const b = boards[idx % boards.length];
      $('boardTitle').textContent = b.title;
      $('boardSub').textContent = b.sub || '';
      const rows = b.teams.map((t,i)=>{
        const diff=(t.points_for||0)-(t.points_against||0);
        const dcls=diff>0?'pos-v':(diff<0?'neg-v':'');
        const pcls=i===0?'p1':i===1?'p2':i===2?'p3':'';
        return `<tr class="${pcls}"><td class="pos">${i+1}</td><td class="l team">${esc(t.team_name||'Team')}</td><td>${t.played||0}</td><td>${t.won||0}</td><td>${t.lost||0}</td><td class="diff ${dcls}">${diff>0?'+'+diff:diff}</td><td class="pts">${t.league_points||0}</td></tr>`;
      }).join('');
      $('boardBody').innerHTML = `<table class="fade"><thead><tr><th class="l" style="padding-left:3.4vw">#</th><th class="l">Team</th><th>P</th><th>W</th><th>L</th><th>+/–</th><th>Pts</th></tr></thead><tbody>${rows}</tbody></table>`;
      renderDots();
    }

    function renderSide(){
      if (!upcoming.length){ $('sideBody').innerHTML='<div class="state"><div class="sm">No upcoming competitions listed right now. Check back soon!</div></div>'; return; }
      $('sideBody').innerHTML = upcoming.slice(0,4).map(u=>{
        const meta=[];
        if(u.type) meta.push('<span class="badge type">'+esc(cap(u.type))+'</span>');
        if(u.date) meta.push('<span>📅 '+esc(u.date)+'</span>');
        const qr = (u.open && u.code) ? qrFor(u.code) : '';
        return `<div class="up fade"><div class="up-main"><div class="up-top"><div class="up-name">${esc(u.name)}</div>${u.open?'<span class="badge open">Open</span>':'<span class="badge soon">Soon</span>'}</div><div class="up-meta">${meta.join('')}</div>${qr?'<div class="up-scan">📲 Scan to register your team</div>':''}</div>${qr}</div>`;
      }).join('');
    }

    function serveDot(m, side){
      const s=(m.serving_team||'').toLowerCase();
      const on = side==='a' ? (s==='a'||s==='team_a'||(m.team_a&&s===m.team_a.toLowerCase())) : (s==='b'||s==='team_b'||(m.team_b&&s===m.team_b.toLowerCase()));
      return '<span class="serve'+(on?' on':'')+'"></span>';
    }
    function liveFlag(m){
      if (m.is_match_point) return '<span class="lm-flag mp">Match Point</span>';
      if (m.is_set_point)   return '<span class="lm-flag sp">Set Point</span>';
      if (m.is_tiebreak)    return '<span class="lm-flag tb">Tiebreak</span>';
      return '';
    }
    function renderLive(){
      const strip=$('liveStrip');
      if (!live.length){ strip.style.display='none'; if(liveTimer){clearInterval(liveTimer);liveTimer=null;} return; }
      strip.style.display='flex';
      const pages = Math.ceil(live.length/LIVE_PER_PAGE);
      if (livePage >= pages) livePage = 0;
      const start = livePage*LIVE_PER_PAGE;
      const page = live.slice(start, start+LIVE_PER_PAGE);
      $('lsCards').innerHTML = page.map(m=>{
        const ctx = m.match_type ? cap(m.match_type) : '';
        const court = (m.court_number!=null) ? ('Court '+m.court_number) : 'Live';
        return `<div class="lm fade">
          <div class="lm-top"><span class="lm-court">${esc(court)}</span>${ctx?'<span class="lm-ctx">'+esc(ctx)+'</span>':''}${liveFlag(m)}</div>
          <div class="lm-cols"><span>Set</span><span>Gm</span><span>Pt</span></div>
          <div class="lm-grid">
            <div class="lm-name">${serveDot(m,'a')}${esc(m.team_a||'Team A')}</div>
            <div class="lm-nums"><b>${m.sets_a||0}</b><b>${m.game_a||0}</b><b class="pt">${esc(m.point_display_a||'0')}</b></div>
            <div class="lm-name">${serveDot(m,'b')}${esc(m.team_b||'Team B')}</div>
            <div class="lm-nums"><b>${m.sets_b||0}</b><b>${m.game_b||0}</b><b class="pt">${esc(m.point_display_b||'0')}</b></div>
          </div>
        </div>`;
      }).join('');
      if (liveTimer) clearInterval(liveTimer);
      if (pages > 1){
        liveTimer = setInterval(()=>{ livePage=(livePage+1)%pages; renderLive(); }, LIVE_ROTATE_MS);
      }
    }

    function renderDots(){
      const n=boards.length;
      if (n<=1){ $('dots').innerHTML=''; return; }
      let h=''; for(let i=0;i<n;i++) h+='<i class="'+(i===(idx%n)?'on':'')+'"></i>';
      $('dots').innerHTML=h;
    }
    function setupRotation(){
      if (rotateTimer) clearInterval(rotateTimer);
      if (boards.length<=1) return;
      rotateTimer = setInterval(()=>{ idx=(idx+1)%boards.length; renderBoard(); }, ROTATE_MS);
    }

    loadAll();
    setInterval(loadAll, REFRESH_MS);
  </script>
</body>
