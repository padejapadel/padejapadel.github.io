<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Padel Pals - Court Display</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0A1628;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 48px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .logo {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 6px;
      color: #00D4AA;
    }
    .court-name {
      font-size: 22px;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      letter-spacing: 3px;
    }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,0,0,0.1);
      border: 1px solid rgba(255,0,0,0.3);
      border-radius: 20px;
      padding: 6px 16px;
    }
    .live-dot {
      width: 10px;
      height: 10px;
      background: red;
      border-radius: 50%;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .live-text {
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 3px;
      color: red;
    }
    .live-badge.hidden { visibility: hidden; }

    /* Main score area */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 48px;
      gap: 32px;
    }

    /* Team panel */
    .team-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 32px;
      padding: 40px 32px;
      height: 100%;
      transition: all 0.3s ease;
    }
    .team-panel.serving {
      background: rgba(0,212,170,0.06);
      border-color: rgba(0,212,170,0.25);
    }
    .team-panel.serving-b {
      background: rgba(255,107,107,0.06);
      border-color: rgba(255,107,107,0.25);
    }
    .team-panel.advantage {
      border-width: 2px;
    }

    .serve-indicator {
      font-size: 28px;
      height: 36px;
      display: flex;
      align-items: center;
    }
    .serve-indicator.hidden { visibility: hidden; }

    .status-label {
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 3px;
      height: 24px;
      display: flex;
      align-items: center;
    }
    .status-label.deuce { color: #FFD700; }
    .status-label.adv-a { color: #00D4AA; }
    .status-label.adv-b { color: #FF6B6B; }

    .point-score {
      font-size: clamp(80px, 14vw, 160px);
      font-weight: 900;
      line-height: 1;
      transition: all 0.2s ease;
    }
    .team-a .point-score { color: #00D4AA; }
    .team-b .point-score { color: #FF6B6B; }

    .team-name {
      font-size: clamp(20px, 2.5vw, 36px);
      font-weight: 700;
      text-align: center;
      color: rgba(255,255,255,0.7);
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Sets panel */
    .sets-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      min-width: 120px;
    }

    .sets-title {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.3);
    }

    .sets-grid {
      display: flex;
      gap: 12px;
    }

    .set-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .set-score {
      font-size: clamp(28px, 4vw, 52px);
      font-weight: 900;
      color: rgba(255,255,255,0.3);
      line-height: 1;
      width: 52px;
      text-align: center;
    }
    .set-score.winner-a { color: #00D4AA; }
    .set-score.winner-b { color: #FF6B6B; }
    .set-score.current { color: white; }

    .divider-dot {
      width: 8px;
      height: 8px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      margin: 20px 0;
    }

    .tb-badge {
      font-size: 10px;
      font-weight: 900;
      color: #FFD700;
      letter-spacing: 2px;
      margin-top: -8px;
    }

    /* Waiting state */
    .waiting {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: rgba(255,255,255,0.2);
    }
    .waiting-icon { font-size: 64px; }
    .waiting-text { font-size: 20px; font-weight: 600; letter-spacing: 2px; }
    .waiting-sub { font-size: 14px; }

    /* Winner state */
    .winner-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }
    .trophy { font-size: 96px; }
    .winner-label { font-size: 18px; font-weight: 900; letter-spacing: 6px; color: rgba(255,255,255,0.4); }
    .winner-name { font-size: clamp(40px, 6vw, 80px); font-weight: 900; color: #FFD700; text-align: center; }

    /* Footer */
    .footer {
      padding: 16px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .footer-time { font-size: 12px; color: rgba(255,255,255,0.2); }
    .footer-brand { font-size: 12px; color: rgba(255,255,255,0.15); letter-spacing: 2px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">PADEL PALS</div>
    <div class="court-name" id="court-label">COURT —</div>
    <div class="live-badge hidden" id="live-badge">
      <div class="live-dot"></div>
      <div class="live-text">LIVE</div>
    </div>
  </div>

  <div id="main-content" class="waiting">
    <div class="waiting-icon">🎾</div>
    <div class="waiting-text">WAITING FOR MATCH</div>
    <div class="waiting-sub" id="waiting-sub">Open Padel Pals and select this court to begin</div>
  </div>

  <div class="footer">
    <div class="footer-time" id="footer-time"></div>
    <div class="footer-brand">PADEL PALS · LIVE SCORING</div>
  </div>

  <script>
    const SUPABASE_URL = "https://odrckirnjavfptlfygbo.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9kcmNraXJuamF2ZnB0bGZ5Z2JvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MzY3MzQsImV4cCI6MjA5NTExMjczNH0.rjoAQhEaTw6Sp-nGrQmYYvLdVKD7ewrKwG1PmMbyYgo";

    const params = new URLSearchParams(window.location.search);
    const courtNum = params.get("court") || "1";
    const courtCode = "COURT" + courtNum;

    document.getElementById("court-label").textContent = "COURT " + courtNum;
    document.getElementById("waiting-sub").textContent = `Open Padel Pals, select Court ${courtNum}, and start a match`;

    function updateTime() {
      const now = new Date();
      document.getElementById("footer-time").textContent = now.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });
    }
    updateTime();
    setInterval(updateTime, 1000);

    function isStale(updatedAt) {
      if (!updatedAt) return false;
      const updated = new Date(updatedAt);
      const diffMinutes = (new Date() - updated) / 1000 / 60;
      return diffMinutes > 5;
    }

    async function fetchScore() {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/live_matches?match_code=eq.${courtCode}&select=*`, {
          headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${SUPABASE_KEY}`
          }
        });

        const data = await res.json();
        const match = data && data.length > 0 ? data[0] : null;

        if (!match || match.match_state === "notStarted" || isStale(match.updated_at)) {
          showWaiting();
          return;
        }

        document.getElementById("live-badge").classList.remove("hidden");

        if (match.match_state === "finished" || isStale(match.updated_at)) {
          showWinner(match);
          return;
        }

        showScore(match);

      } catch(e) {
        console.error(e);
      }
    }

    function showWaiting() {
      document.getElementById("live-badge").classList.add("hidden");
      document.getElementById("main-content").innerHTML = `
        <div class="waiting-icon">🎾</div>
        <div class="waiting-text">WAITING FOR MATCH</div>
        <div class="waiting-sub">Open Padel Pals, select Court ${courtNum}, and start a match</div>
      `;
      document.getElementById("main-content").className = "waiting";
    }

    function showWinner(match) {
      if (!match.match_winner) {
        showWaiting();
        return;
      }
      const winnerName = match.match_winner === "Team A" ? match.team_a : match.team_b;
      document.getElementById("main-content").innerHTML = `
        <div class="winner-screen">
          <div class="trophy">🏆</div>
          <div class="winner-label">MATCH WINNER</div>
          <div class="winner-name">${winnerName}</div>
        </div>
      `;
      document.getElementById("main-content").className = "";
      document.getElementById("main-content").style.flex = "1";
      document.getElementById("main-content").style.display = "flex";
      document.getElementById("main-content").style.alignItems = "center";
      document.getElementById("main-content").style.justifyContent = "center";
    }

    function showScore(match) {
      const isDeuce = match.is_deuce;
      const advA = !isDeuce && match.point_display_a === "Ad";
      const advB = !isDeuce && match.point_display_b === "Ad";
      const scoreA = isDeuce ? "–" : (match.point_display_a || "0");
      const scoreB = isDeuce ? "–" : (match.point_display_b || "0");
      const labelA = isDeuce ? "DEUCE" : advA ? "ADVANTAGE" : "";
      const labelB = isDeuce ? "DEUCE" : advB ? "ADVANTAGE" : "";
      const labelClassA = isDeuce ? "status-label deuce" : advA ? "status-label adv-a" : "status-label";
      const labelClassB = isDeuce ? "status-label deuce" : advB ? "status-label adv-b" : "status-label";
      const servingA = match.serving_team === "Team A";

      // Build sets
      let setsHtml = "";
      try {
        const sets = JSON.parse(match.sets_json || "[]");
        const isCurrent = (i) => i === sets.length - 1;
        sets.forEach((s, i) => {
          const classA = s.completed ? (s.a > s.b ? "winner-a" : "") : (isCurrent(i) ? "current" : "");
          const classB = s.completed ? (s.b > s.a ? "winner-b" : "") : (isCurrent(i) ? "current" : "");
          const tb = s.tiebreak && !s.completed ? '<div class="tb-badge">TB</div>' : '';
          setsHtml += `
            <div class="set-col">
              ${tb}
              <div class="set-score ${classA}">${s.a}</div>
              <div class="divider-dot"></div>
              <div class="set-score ${classB}">${s.b}</div>
            </div>`;
        });
      } catch(e) {}

      document.getElementById("main-content").className = "main";
      document.getElementById("main-content").innerHTML = `
        <div class="team-panel team-a ${servingA ? 'serving' : ''}">
          <div class="serve-indicator ${servingA ? '' : 'hidden'}">🎾</div>
          <div class="${labelClassA}">${labelA}</div>
          <div class="point-score">${scoreA}</div>
          <div class="team-name">${match.team_a || "Team A"}</div>
        </div>

        <div class="sets-panel">
          <div class="sets-title">SETS</div>
          <div class="sets-grid">${setsHtml}</div>
        </div>

        <div class="team-panel team-b ${!servingA ? 'serving serving-b' : ''}">
          <div class="serve-indicator ${!servingA ? '' : 'hidden'}">🎾</div>
          <div class="${labelClassB}">${labelB}</div>
          <div class="point-score">${scoreB}</div>
          <div class="team-name">${match.team_b || "Team B"}</div>
        </div>
      `;
    }

    fetchScore();
    setInterval(fetchScore, 3000);
  </script>
</body>
</html>
