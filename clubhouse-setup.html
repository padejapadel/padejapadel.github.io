<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Padeja — Clubhouse Setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      background: #0a1628;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    .court-bg {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 120vw; height: 120vh;
      opacity: 0.04;
      pointer-events: none;
    }

    .card {
      background: #0f1f38;
      border: 1px solid #1e3050;
      border-radius: 24px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 520px;
      position: relative;
      z-index: 1;
    }

    .logo-mark {
      width: 52px; height: 52px;
      background: #3ecf8e;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
      font-size: 24px;
    }

    h1 {
      font-size: 28px; font-weight: 900; color: #fff;
      text-align: center; margin-bottom: 4px;
    }

    .subtitle {
      font-size: 11px; color: #3ecf8e; letter-spacing: 2px;
      text-transform: uppercase; text-align: center;
      margin-bottom: 2rem; font-weight: 600;
    }

    .section-title {
      font-size: 10px; font-weight: 700; letter-spacing: 3px;
      color: rgba(255,255,255,0.35); text-transform: uppercase;
      margin-bottom: 10px; margin-top: 24px;
    }
    .section-title:first-of-type { margin-top: 0; }

    .court-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 8px;
    }

    .court-input-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .court-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      color: rgba(255,255,255,0.4); text-transform: uppercase;
    }

    .code-input {
      background: #0a1628;
      border: 1.5px solid #1e3050;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 16px; font-weight: 700;
      color: #3ecf8e;
      font-family: 'Outfit', monospace;
      outline: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: border-color 0.15s;
      width: 100%;
    }
    .code-input::placeholder { color: rgba(255,255,255,0.15); letter-spacing: 1px; font-weight: 400; font-size: 13px; }
    .code-input:focus { border-color: #3ecf8e; }
    .code-input.tournament { color: #ffd700; }
    .code-input.tournament:focus { border-color: #ffd700; }

    .tournament-wrap { margin-top: 4px; }

    .go-btn {
      width: 100%;
      margin-top: 2rem;
      background: #3ecf8e;
      color: #0a1628;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px; font-weight: 900;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s, transform 0.1s;
      text-transform: uppercase;
    }
    .go-btn:hover { background: #2db87a; }
    .go-btn:active { transform: scale(0.98); }
    .go-btn:disabled { background: #1a2e48; color: #3a5a7a; cursor: not-allowed; }

    .hint {
      font-size: 12px; color: rgba(255,255,255,0.25);
      text-align: center; margin-top: 12px; line-height: 1.5;
    }
  </style>
</head>
<body>

  <svg class="court-bg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <rect x="80" y="50" width="640" height="400" stroke="white" stroke-width="3" fill="none"/>
    <line x1="400" y1="50" x2="400" y2="450" stroke="white" stroke-width="3"/>
    <line x1="80" y1="250" x2="720" y2="250" stroke="white" stroke-width="3"/>
    <line x1="200" y1="130" x2="600" y2="130" stroke="white" stroke-width="2"/>
    <line x1="200" y1="370" x2="600" y2="370" stroke="white" stroke-width="2"/>
    <line x1="200" y1="130" x2="200" y2="370" stroke="white" stroke-width="2"/>
    <line x1="600" y1="130" x2="600" y2="370" stroke="white" stroke-width="2"/>
  </svg>

  <div class="card">
    <div class="logo-mark">🎾</div>
    <h1>Clubhouse Display</h1>
    <p class="subtitle">Padeja · TV Setup</p>

    <div class="section-title">Court Match Codes (enter up to 6)</div>
    <div class="court-grid">
      <div class="court-input-wrap">
        <span class="court-label">Court 1</span>
        <input class="code-input" id="c1" maxlength="6" placeholder="e.g. AB3X7K" autocomplete="off" spellcheck="false">
      </div>
      <div class="court-input-wrap">
        <span class="court-label">Court 2</span>
        <input class="code-input" id="c2" maxlength="6" placeholder="e.g. TY8Z2M" autocomplete="off" spellcheck="false">
      </div>
      <div class="court-input-wrap">
        <span class="court-label">Court 3</span>
        <input class="code-input" id="c3" maxlength="6" placeholder="Optional" autocomplete="off" spellcheck="false">
      </div>
      <div class="court-input-wrap">
        <span class="court-label">Court 4</span>
        <input class="code-input" id="c4" maxlength="6" placeholder="Optional" autocomplete="off" spellcheck="false">
      </div>
      <div class="court-input-wrap">
        <span class="court-label">Court 5</span>
        <input class="code-input" id="c5" maxlength="6" placeholder="Optional" autocomplete="off" spellcheck="false">
      </div>
      <div class="court-input-wrap">
        <span class="court-label">Court 6</span>
        <input class="code-input" id="c6" maxlength="6" placeholder="Optional" autocomplete="off" spellcheck="false">
      </div>
    </div>

    <div class="section-title" style="margin-top:20px">Tournament Code (optional)</div>
    <div class="tournament-wrap">
      <input class="code-input tournament" id="tc" maxlength="6" placeholder="Tournament share code" autocomplete="off" spellcheck="false">
    </div>

    <button class="go-btn" id="goBtn" onclick="launch()">⛶ Go Fullscreen</button>
    <p class="hint">Enter at least one match code or a tournament code.<br>Bookmark the display page to reuse these settings.</p>
  </div>

  <script>
    // Auto-uppercase inputs
    document.querySelectorAll('.code-input').forEach(input => {
      input.addEventListener('input', () => {
        input.value = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
      });
    });

    function launch() {
      const courts = ['c1','c2','c3','c4','c5','c6']
        .map(id => document.getElementById(id).value.trim())
        .filter(v => v.length === 6);
      const tournament = document.getElementById('tc').value.trim();

      if (courts.length === 0 && tournament.length !== 6) {
        alert('Please enter at least one valid 6-character code.');
        return;
      }

      const params = new URLSearchParams();
      if (courts.length > 0) params.set('codes', courts.join(','));
      if (tournament.length === 6) params.set('tournament', tournament);

      window.location.href = `clubhouse.html?${params.toString()}`;
    }
  </script>
</body>
</html>
